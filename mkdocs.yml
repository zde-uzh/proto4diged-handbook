site_name: Handbuch zur Erstellung einer digitalen Edition
site_dir: public
nav:
  - "Einleitung": "index.md"
  - "1. Planung":
    - "1_Planung/01_Projektziele_und_-ressourcen.md" 
    - "1_Planung/02_Vorbildhafte_Editionen.md"
    - "1_Planung/03_Vernetzung.md"
  - "2. Editionsarbeit":
      - "2_Editionsarbeit/01_Einleitung_in_die_digitale_Editionsarbeit.md"
      - "2_Editionsarbeit/02_Textkonstitution.md"
      - "2_Editionsarbeit/03_Transkription.md"
      - "2_Editionsarbeit/04_converting.md"
      - "2_Editionsarbeit/05_critical_annotation.md"
      - "2_Editionsarbeit/06_semantic_annotation.md"
      - "2_Editionsarbeit/07_commenting.md"
  - "3. Publikation":
      - "3_Publikation/01_introduction_publication.md"
  - "4. Langzeitarchivierung":
      - "4. Langzeitarchivierung/01_introduction_preservation.md"
  - "Themen":
      - "Themen/accesibility.md"
      - "Themen/authority.md"
      - "Themen/transkribus.md"
      - "Themen/tei.md"
      - "Themen/tei-publisher-annotations.md"

theme:
  language: de
  name: material
  features:
    - content.code.copy
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - toc.integrate

  palette:
    primary: green
    accent: red

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - md_in_html
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search
  - tags
