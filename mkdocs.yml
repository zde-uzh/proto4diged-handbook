site_name: Handbuch zur Erstellung einer digitalen Edition
site_dir: public
nav:
  - "Einleitung": "Startseite.md"
  - "1. Planung":
    - "1. Planung/01_Projektziele_und_-ressourcen.md" 
    - "1. Planung/02_Vorbildhafte_Editionen.md"
    - "1. Planung/03_Vernetzung.md"
  - "2. Editionsarbeit":
      - "2. Editionsarbeit/01_Einleitung_in_die_digitale_Editionsarbeit.md"
      - "2. Editionsarbeit/02_Textkonstitution.md"
      - "2. Editionsarbeit/03_Transkription.md"
      - "2. Editionsarbeit/04_converting.md"
      - "2. Editionsarbeit/05_critical_annotation.md"
      - "2. Editionsarbeit/06_semantic_annotation.md"
      - "2. Editionsarbeit/07_commenting.md"
  - "3. Publikationsplattform":
      - "3. Publikationsplattform/01_introduction_publication.md"
  - "4. Langzeitarchivierung":
      - "4. Langzeitarchivierung/01_introduction_preservation.md"
  - "Themen":
      - "Themen/accesibility.md"
      - "Themen/authority.md"
      - "Themen/transkribus.md"
      - "Themen/tei.md"
      - "Themen/tei-publisher-annotations.md"

theme:
  language: de
  name: material
  features:
    - content.code.copy
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - toc.integrate

  palette:
    primary: green
    accent: red

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - md_in_html
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search
